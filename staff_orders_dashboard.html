<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Orders Dashboard</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container staff-orders-page">
        <div class="staff-header">
            <h1>Orders Dashboard</h1>
            <div class="header-actions">
                <button id="backBtn" class="back-nav-btn">← Back to Menu</button>
                <button id="logoutBtn" class="logoutbtn">Logout</button>
            </div>
        </div>

        <div class="dashboard-content">
            <!-- Stats Section -->
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-info">
                        <h3>Total Orders</h3>
                        <p class="stat-value" id="totalOrdersCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <h3>Pending Orders</h3>
                        <p class="stat-value" id="pendingOrdersCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3>Delivered</h3>
                        <p class="stat-value" id="deliveredOrdersCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">❌</div>
                    <div class="stat-info">
                        <h3>Unable to Deliver</h3>
                        <p class="stat-value" id="undeliverableOrdersCount">0</p>
                    </div>
                </div>
            </div>

            <!-- Search Section -->
            <div class="search-box-container">
                <h2>Search Orders</h2>
                <div class="search-controls">
                    <input type="text" id="searchInput" placeholder="Enter Order ID or Student Name..." autocomplete="off">
                    <button id="searchBtn" class="search-btn">🔍 Search</button>
                    <button id="clearSearchBtn" class="clear-btn">Clear</button>
                    <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>
                </div>
                <!-- Search Results Dropdown -->
                <div id="searchResultsDropdown" style="display: none; margin-top: 15px; border: 2px solid #007bff; border-radius: 8px; max-height: 400px; overflow-y: auto; background: white;">
                    <div id="searchResultsList"></div>
                </div>
            </div>

            <!-- Three Column Orders Display -->
            <div class="three-column-orders">
                <div class="orders-column pending-column">
                    <h2>⏳ Pending</h2>
                    <div id="pendingOrdersContainer" class="column-content">
                        <p class="loading">Loading...</p>
                    </div>
                </div>

                <div class="orders-column delivered-column">
                    <h2>✅ Delivered</h2>
                    <div id="deliveredOrdersContainer" class="column-content">
                        <p class="loading">Loading...</p>
                    </div>
                </div>

                <div class="orders-column undeliverable-column">
                    <h2>❌ Unable to Deliver</h2>
                    <div id="undeliverableOrdersContainer" class="column-content">
                        <p class="loading">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        // Check if user is logged in as staff
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = window.CanteenDB.getSession();
            if (!currentUser || currentUser.type !== 'staff') {
                alert('Access denied! Staff login required.');
                window.location.href = 'index.html';
                return;
            }

            loadOrders();
            setupEventListeners();
        });

        let allOrders = [];

        async function loadOrders() {
            try {
                const orders = await window.CanteenDB.getAllOrdersArray();
                allOrders = orders;
                updateStats(orders);
                displayOrders(orders);
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersContainer').innerHTML = `
                    <div class="error-message">
                        <p>Error loading orders: ${error.message}</p>
                        <button onclick="loadOrders()">Try Again</button>
                    </div>
                `;
            }
        }

        function updateStats(orders) {
            const totalCount = orders.length;
            const pendingCount = orders.filter(o => !o.status || o.status === 'pending').length;
            const deliveredCount = orders.filter(o => o.status === 'delivered').length;
            const undeliverableCount = orders.filter(o => o.status === 'undeliverable').length;
            
            document.getElementById('totalOrdersCount').textContent = totalCount;
            document.getElementById('pendingOrdersCount').textContent = pendingCount;
            document.getElementById('deliveredOrdersCount').textContent = deliveredCount;
            document.getElementById('undeliverableOrdersCount').textContent = undeliverableCount;
        }

        function displayOrders(orders) {
            if (!orders || orders.length === 0) {
                const emptyMsg = `
                    <div class="no-orders-message">
                        <p>No orders found</p>
                        <p>Orders will appear here once students place them</p>
                    </div>
                `;
                document.getElementById('pendingOrdersContainer').innerHTML = emptyMsg;
                document.getElementById('deliveredOrdersContainer').innerHTML = emptyMsg;
                document.getElementById('undeliverableOrdersContainer').innerHTML = emptyMsg;
                return;
            }

            orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            // Separate orders by status
            const pendingOrders = orders.filter(o => !o.status || o.status === 'pending');
            const deliveredOrders = orders.filter(o => o.status === 'delivered');
            const undeliverableOrders = orders.filter(o => o.status === 'undeliverable');

            // Display each column
            displayColumn('pendingOrdersContainer', pendingOrders, 'pending');
            displayColumn('deliveredOrdersContainer', deliveredOrders, 'delivered');
            displayColumn('undeliverableOrdersContainer', undeliverableOrders, 'undeliverable');
        }

        function displayColumn(containerId, orders, status) {
            const container = document.getElementById(containerId);
            
            if (!orders || orders.length === 0) {
                container.innerHTML = '<p class="no-orders-in-column">No orders</p>';
                return;
            }

            let ordersHTML = '';
            orders.forEach(order => {
                const orderDate = new Date(order.timestamp).toLocaleString();
                const itemsList = order.items ? order.items.map(item => `${item.name} (₹${item.price})`).join(', ') : 'No items';

                let actionButtons = '';
                if (status === 'pending') {
                    actionButtons = `
                        <button onclick="markAsDelivered('${order.orderId}')" class="action-btn delivered">✓ Delivered</button>
                        <button onclick="markAsUndeliverable('${order.orderId}')" class="action-btn undeliverable">✗ Unable</button>
                    `;
                }

                ordersHTML += `
                    <div class="order-card-column">
                        <div class="order-card-header">
                            <h4>Order #${order.orderId}</h4>
                            <span class="order-time-small">${orderDate}</span>
                        </div>
                        <div class="order-card-body">
                            <p><strong>Student:</strong> ${order.userName}</p>
                            <p><strong>Class:</strong> ${order.userClass}</p>
                            <p><strong>Items:</strong> ${itemsList}</p>
                            <p><strong>Total:</strong> ₹${order.totalPrice}</p>
                        </div>
                        <div class="order-card-actions">
                            ${actionButtons}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = ordersHTML;
        }

        function searchOrders() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const dropdown = document.getElementById('searchResultsDropdown');
            const resultsList = document.getElementById('searchResultsList');
            
            if (!searchTerm) {
                dropdown.style.display = 'none';
                return;
            }

            const searchLower = searchTerm.toLowerCase();
            const filteredOrders = [];
            
            // Loop through each order and check for matches
            for (let i = 0; i < allOrders.length; i++) {
                const order = allOrders[i];
                const orderId = String(order.orderId || '');
                const studentName = String(order.userName || '').toLowerCase();
                const studentClass = String(order.userClass || '').toLowerCase();
                
                // Match by exact order ID, or partial name/class match
                if (orderId === searchTerm || studentName.includes(searchLower) || studentClass.includes(searchLower)) {
                    filteredOrders.push(order);
                }
            }

            // Display results in dropdown
            if (filteredOrders.length === 0) {
                resultsList.innerHTML = '<div style="padding: 15px; text-align: center; color: #999;">No results found for: "' + searchTerm + '"</div>';
            } else {
                let html = '';
                filteredOrders.forEach(order => {
                    const orderDate = new Date(order.timestamp).toLocaleString();
                    const itemsList = order.items ? order.items.map(item => item.name).join(', ') : 'No items';
                    const statusBadge = order.status || 'pending';
                    const statusColor = statusBadge === 'pending' ? '#FFA500' : statusBadge === 'delivered' ? '#28a745' : '#dc3545';

                    html += `
                        <div style="padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">
                            <div style="font-weight: bold; color: #333;">Order #${order.orderId}</div>
                            <div style="font-size: 13px; color: #666; margin-top: 4px;">
                                <strong>Student:</strong> ${order.userName} (Class: ${order.userClass})
                            </div>
                            <div style="font-size: 13px; color: #666;">
                                <strong>Items:</strong> ${itemsList}
                            </div>
                            <div style="font-size: 13px; color: #666;">
                                <strong>Total:</strong> ₹${order.totalPrice} | 
                                <span style="background: ${statusColor}; color: white; padding: 2px 8px; border-radius: 3px; font-size: 11px;">${statusBadge.toUpperCase()}</span>
                            </div>
                            <div style="font-size: 12px; color: #999; margin-top: 4px;">${orderDate}</div>
                        </div>
                    `;
                });
                resultsList.innerHTML = html;
            }
            
            dropdown.style.display = 'block';
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResultsDropdown').style.display = 'none';
            displayOrders(allOrders);
        }

        async function markAsDelivered(orderId) {
            if (confirm('Mark this order as delivered?')) {
                const success = await window.CanteenDB.updateOrderStatus(orderId, 'delivered');
                if (success) {
                    alert('Order marked as delivered!');
                    loadOrders();
                } else {
                    alert('Failed to mark order as delivered.');
                }
            }
        }

        async function markAsUndeliverable(orderId) {
            if (confirm('Mark this order as unable to deliver?')) {
                const success = await window.CanteenDB.updateOrderStatus(orderId, 'undeliverable');
                if (success) {
                    alert('Order marked as unable to deliver!');
                    loadOrders();
                } else {
                    alert('Failed to mark order.');
                }
            }
        }

        function setupEventListeners() {
            document.getElementById('searchBtn').addEventListener('click', searchOrders);
            document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
            document.getElementById('refreshBtn').addEventListener('click', loadOrders);
            document.getElementById('backBtn').addEventListener('click', () => {
                window.location.href = 'staff_view.html';
            });
            document.getElementById('logoutBtn').addEventListener('click', () => {
                window.CanteenDB.clearSession();
                alert('Logged out successfully!');
                window.location.href = 'index.html';
            });
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchOrders();
            });
        }
    </script>
</body>
</html>
