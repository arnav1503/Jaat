<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen App - Welcome!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style2.css') }}">
    <style>
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            max-width: 400px;
            padding: 16px 24px;
            border-radius: 20px;
            z-index: 9999;
            animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: none;
            font-weight: 600;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.15), -8px -8px 20px rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }
        .notification.show { display: block; }
        .notification.success {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }
        .notification.error {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
        }
        .notification.info {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }
        @keyframes slideIn {
            from {
                transform: translateX(500px) rotateY(90deg);
                opacity: 0;
            }
            to {
                transform: translateX(0) rotateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin: 6px 0;
            animation: fadeInUp 0.6s ease-out backwards;
        }
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        .form-group:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2D3748;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            box-sizing: border-box;
        }

        .form-group input.error {
            box-shadow: inset 5px 5px 10px #f44336, inset -5px -5px 10px rgba(244, 67, 54, 0.3) !important;
            border: 2px solid #f44336 !important;
            background: #ffebee !important;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            font-weight: 600;
            animation: shake 0.3s;
        }
        .error-message.show { display: block; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        button {
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auth-section:not(.hidden) button {
            animation: slideInUp 0.5s ease-out 0.7s backwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <button class="ai-assistant-btn" onclick="window.location.href='/ai_assistant'" title="AI Assistant">🤖</button>

    <div id="notification" class="notification"></div>

    <div class="container welcome-page">
        <h1>Welcome to the Canteen App!</h1>
        <p>Choose your option to get started:</p>

        <div class="main-options auth-options">
            <button id="studentLoginBtn" class="main-option-btn">Student Login</button>
            <button id="studentRegisterBtn" class="main-option-btn">STUDENT REGISTER</button>
            <button id="teacherLoginBtn" class="main-option-btn">Teacher Login</button>
            <button id="teacherRegisterBtn" class="main-option-btn">TEACHER REGISTER</button>
            <button id="staffLoginBtn" class="main-option-btn">Staff Login</button>
        </div>

        <!-- Student Login Section -->
        <div class="auth-section hidden" id="loginSection" role="region" aria-label="Student Login Form">
            <h2>Student Login</h2>
            <div class="form-group">
                <label for="loginId">Student ID</label>
                <input type="text" id="loginId" placeholder="Enter your Student ID" required aria-describedby="loginIdError">
                <div id="loginIdError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your Password" required aria-describedby="loginPasswordError">
                <div id="loginPasswordError" class="error-message"></div>
            </div>
            <button id="loginBtn">Login</button>
            <button id="backToMainBtn" class="back-btn">Back to Main</button>
        </div>

        <!-- Student Registration Section -->
        <div class="auth-section hidden" id="studentRegistrarSection" role="region" aria-label="Student Registration Form">
            <h2>Student Register</h2>
            <div class="form-group">
                <label for="manualEmail">Email</label>
                <input type="email" id="manualEmail" placeholder="your@email.com" required aria-describedby="emailError">
                <div id="emailError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="manualName">Full Name</label>
                <input type="text" id="manualName" placeholder="Your Full Name" required aria-describedby="nameError">
                <div id="nameError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="manualAdmissionId">Admission ID</label>
                <input type="text" id="manualAdmissionId" placeholder="e.g., 18/20" required aria-describedby="admissionError">
                <div id="admissionError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="manualClass">Class</label>
                <input type="text" id="manualClass" placeholder="e.g., 7A" required aria-describedby="classError">
                <div id="classError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="manualStudentId">Student ID</label>
                <input type="text" id="manualStudentId" placeholder="e.g., STU001" required aria-describedby="studentIdError">
                <div id="studentIdError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="manualPassword">Password</label>
                <input type="password" id="manualPassword" placeholder="Minimum 6 characters" minlength="6" required aria-describedby="passwordError">
                <div id="passwordError" class="error-message"></div>
            </div>
            <button id="manualRegisterSubmitBtn" type="submit">Register</button>
            <button id="backToMainFromRegistrarBtn" class="back-btn">Back to Main</button>
        </div>

        <!-- Teacher Login Section -->
        <div class="auth-section hidden" id="teacherLoginSection" role="region" aria-label="Teacher Login Form">
            <h2>Teacher Login</h2>
            <div class="form-group">
                <label for="teacherLoginId">Staff ID</label>
                <input type="text" id="teacherLoginId" placeholder="Enter Staff ID" required aria-describedby="teacherLoginIdError">
                <div id="teacherLoginIdError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="teacherLoginPassword">Password</label>
                <input type="password" id="teacherLoginPassword" placeholder="Enter Password" required aria-describedby="teacherLoginPasswordError">
                <div id="teacherLoginPasswordError" class="error-message"></div>
            </div>
            <button id="teacherLoginSubmitBtn">Login as Teacher</button>
            <button id="backToMainFromTeacherLoginBtn" class="back-btn">Back to Main</button>
        </div>

        <!-- Teacher Registration Section -->
        <div class="auth-section hidden" id="teacherRegisterSection" role="region" aria-label="Teacher Registration Form">
            <h2>Teacher Register</h2>
            <div class="form-group">
                <label for="teacherName">Full Name</label>
                <input type="text" id="teacherName" placeholder="Your Full Name" required aria-describedby="teacherNameError">
                <div id="teacherNameError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="teacherStaffId">Staff ID</label>
                <input type="text" id="teacherStaffId" placeholder="e.g., T001" required aria-describedby="teacherStaffIdError">
                <div id="teacherStaffIdError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="teacherPassword">Password</label>
                <input type="password" id="teacherPassword" placeholder="Minimum 6 characters" minlength="6" required aria-describedby="teacherPasswordError">
                <div id="teacherPasswordError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="teacherEmail">Email</label>
                <input type="email" id="teacherEmail" placeholder="your@email.com" required aria-describedby="teacherEmailError">
                <div id="teacherEmailError" class="error-message"></div>
            </div>
            <button id="teacherRegisterSubmitBtn">Register</button>
            <button id="backToMainFromTeacherRegisterBtn" class="back-btn">Back to Main</button>
        </div>

        <!-- Staff Login Section -->
        <div class="auth-section hidden" id="staffSection" role="region" aria-label="Staff Login Form">
            <h2>Staff Login</h2>
            <div class="form-group">
                <label for="staffId">Staff ID</label>
                <input type="text" id="staffId" placeholder="Enter Staff ID" required aria-describedby="staffIdError">
                <div id="staffIdError" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="staffPassword">Password</label>
                <input type="password" id="staffPassword" placeholder="Enter Staff Password" required aria-describedby="staffPasswordError">
                <div id="staffPasswordError" class="error-message"></div>
            </div>
            <button id="staffLoginSubmitBtn">Login as Staff</button>
            <button id="backToMainFromStaffBtn" class="back-btn">Back to Main</button>
        </div>
    </div>

    <script>
        const notificationEl = document.getElementById('notification');

        function showNotification(message, type = 'info', duration = 4000) {
            notificationEl.className = `notification ${type} show`;
            notificationEl.textContent = message;
            setTimeout(() => {
                notificationEl.classList.remove('show');
            }, duration);
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
        }

        function showError(fieldId, message) {
            const input = document.getElementById(fieldId);
            const errorEl = document.getElementById(fieldId + 'Error');
            if (input && errorEl) {
                input.classList.add('error');
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validateForm(fields) {
            clearErrors();
            let valid = true;
            for (const [fieldId, rules] of Object.entries(fields)) {
                const input = document.getElementById(fieldId);
                const value = input.value.trim();

                if (rules.required && !value) {
                    showError(fieldId, 'This field is required');
                    valid = false;
                } else if (rules.email && value && !validateEmail(value)) {
                    showError(fieldId, 'Invalid email format');
                    valid = false;
                } else if (rules.minLength && value && value.length < rules.minLength) {
                    showError(fieldId, `Minimum ${rules.minLength} characters`);
                    valid = false;
                }
            }
            return valid;
        }

        function setButtonLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Processing...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.getAttribute('data-original-text') || 'Submit';
            }
        }

        function showSection(sectionId) {
            document.getElementById('loginSection')?.classList.add('hidden');
            document.getElementById('studentRegistrarSection')?.classList.add('hidden');
            document.getElementById('teacherLoginSection')?.classList.add('hidden');
            document.getElementById('teacherRegisterSection')?.classList.add('hidden');
            document.getElementById('staffSection')?.classList.add('hidden');
            document.querySelector('.main-options')?.classList.add('hidden');
            clearErrors();

            if (sectionId === 'main') {
                document.querySelector('.main-options')?.classList.remove('hidden');
            } else {
                document.getElementById(sectionId)?.classList.remove('hidden');
            }
        }

        // Event Listeners
        document.getElementById('studentLoginBtn').addEventListener('click', () => showSection('loginSection'));
        document.getElementById('studentRegisterBtn').addEventListener('click', () => showSection('studentRegistrarSection'));
        document.getElementById('teacherLoginBtn').addEventListener('click', () => showSection('teacherLoginSection'));
        document.getElementById('teacherRegisterBtn').addEventListener('click', () => showSection('teacherRegisterSection'));
        document.getElementById('staffLoginBtn').addEventListener('click', () => showSection('staffSection'));
        document.getElementById('backToMainBtn').addEventListener('click', () => showSection('main'));
        document.getElementById('backToMainFromRegistrarBtn').addEventListener('click', () => showSection('main'));
        document.getElementById('backToMainFromTeacherLoginBtn').addEventListener('click', () => showSection('main'));
        document.getElementById('backToMainFromTeacherRegisterBtn').addEventListener('click', () => showSection('main'));
        document.getElementById('backToMainFromStaffBtn').addEventListener('click', () => showSection('main'));

        // Student Login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            if (!validateForm({ loginId: { required: true }, loginPassword: { required: true } })) return;

            const userId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const btn = document.getElementById('loginBtn');
            btn.setAttribute('data-original-text', 'Login');
            setButtonLoading(btn, true);

            try {
                const response = await fetch('/student_login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        password: password
                    })
                });

                console.log('Login response status:', response.status);
                console.log('Login response headers:', response.headers.get('content-type'));

                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    showNotification('✓ Login successful!', 'success', 2000);
                    setTimeout(() => window.location.href = '/student_info', 800);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    showError('loginPassword', errorData.message || 'Invalid credentials');
                    showNotification('✗ ' + (errorData.message || 'Login failed'), 'error');
                }
            } catch (e) {
                showNotification('✗ Error: ' + e.message, 'error');
            } finally {
                setButtonLoading(btn, false);
            }
        });

        // Student Register
        document.getElementById('manualRegisterSubmitBtn').addEventListener('click', async () => {
            if (!validateForm({
                manualEmail: { required: true, email: true },
                manualName: { required: true },
                manualAdmissionId: { required: true },
                manualClass: { required: true },
                manualStudentId: { required: true },
                manualPassword: { required: true, minLength: 6 }
            })) return;

            const email = document.getElementById('manualEmail').value.trim();
            const name = document.getElementById('manualName').value.trim();
            const admissionId = document.getElementById('manualAdmissionId').value.trim();
            const studentClass = document.getElementById('manualClass').value.trim();
            const studentId = document.getElementById('manualStudentId').value.trim();
            const password = document.getElementById('manualPassword').value.trim();

            const btn = document.getElementById('manualRegisterSubmitBtn');
            btn.setAttribute('data-original-text', 'STUDENT REGISTAR');
            setButtonLoading(btn, true);

            try {
                const response = await fetch('/student_register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, admissionId, className: studentClass, userId: studentId, password }),
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    showNotification('✓ Registration successful!', 'success', 2000);
                    setTimeout(() => window.location.href = '/student_info', 800);
                } else {
                    showNotification('✗ Registration failed', 'error');
                }
            } catch (e) {
                showNotification('✗ Error: ' + e.message, 'error');
            } finally {
                setButtonLoading(btn, false);
            }
        });

        // Teacher Login Submit (inside the form)
        document.getElementById('teacherLoginSubmitBtn').addEventListener('click', async () => {
            if (!validateForm({ teacherLoginId: { required: true }, teacherLoginPassword: { required: true } })) return;

            const staffId = document.getElementById('teacherLoginId').value.trim();
            const password = document.getElementById('teacherLoginPassword').value.trim();
            const btn = document.getElementById('teacherLoginSubmitBtn');
            btn.setAttribute('data-original-text', 'Login as Teacher');
            setButtonLoading(btn, true);

            try {
                const response = await fetch('/teacher_login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staffId, password }),
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    showNotification('✓ Teacher login successful!', 'success', 2000);
                    setTimeout(() => window.location.href = '/teacher_info', 800);
                } else {
                    try {
                        const error = await response.json();
                        showError('teacherLoginPassword', error.message || 'Invalid credentials');
                        showNotification('✗ ' + (error.message || 'Login failed'), 'error');
                    } catch (parseError) {
                        showError('teacherLoginPassword', 'Login failed');
                        showNotification('✗ Server error. Please try again.', 'error');
                    }
                }
            } catch (e) {
                showNotification('✗ Error: ' + e.message, 'error');
            } finally {
                setButtonLoading(btn, false);
            }
        });

        // Teacher Register
        document.getElementById('teacherRegisterSubmitBtn').addEventListener('click', async () => {
            if (!validateForm({
                teacherName: { required: true },
                teacherStaffId: { required: true },
                teacherPassword: { required: true, minLength: 6 },
                teacherEmail: { required: true, email: true }
            })) return;

            const name = document.getElementById('teacherName').value.trim();
            const staffId = document.getElementById('teacherStaffId').value.trim();
            const password = document.getElementById('teacherPassword').value.trim();
            const email = document.getElementById('teacherEmail').value.trim();
            const btn = document.getElementById('teacherRegisterSubmitBtn');
            btn.setAttribute('data-original-text', 'Register');
            setButtonLoading(btn, true);

            try {
                const response = await fetch('/teacher_register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, staffId, password, email }),
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    showNotification('✓ Registration successful!', 'success', 2000);
                    setTimeout(() => window.location.href = '/teacher_info', 800);
                } else {
                    const error = await response.json();
                    showNotification('✗ ' + (error.message || 'Registration failed'), 'error');
                }
            } catch (e) {
                showNotification('✗ Error: ' + e.message, 'error');
            } finally {
                setButtonLoading(btn, false);
            }
        });

        // Staff Login
        document.getElementById('staffLoginSubmitBtn').addEventListener('click', async () => {
            if (!validateForm({ staffId: { required: true }, staffPassword: { required: true } })) return;

            const staffId = document.getElementById('staffId').value.trim();
            const password = document.getElementById('staffPassword').value.trim();
            const btn = document.getElementById('staffLoginSubmitBtn');
            btn.setAttribute('data-original-text', 'Login as Staff');
            setButtonLoading(btn, true);

            try {
                const response = await fetch('/staff_login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staffId, password }),
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    showNotification('✓ Staff login successful!', 'success', 2000);
                    setTimeout(() => window.location.href = '/staff_view', 800);
                } else {
                    try {
                        const error = await response.json();
                        showError('staffPassword', error.message || 'Invalid credentials');
                        showNotification('✗ ' + (error.message || 'Login failed'), 'error');
                    } catch (parseError) {
                        showError('staffPassword', 'Login failed');
                        showNotification('✗ Server error. Please try again.', 'error');
                    }
                }
            } catch (e) {
                showNotification('✗ Error: ' + e.message, 'error');
            } finally {
                setButtonLoading(btn, false);
            }
        });

        showSection('main');
    </script>
</body>
</html>
